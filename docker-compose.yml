services:
  mysql:
    image: mysql:8.0
    container_name: legends-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: losw
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  data-service:
    build: ./data-service
    container_name: data-service
    ports:
      - "5003:5003"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/losw
      DB_USER: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/api/data/health"]
      interval: 15s
      timeout: 5s
      retries: 6

  profile-service:
    build: ./profile-service
    container_name: profile-service
    ports:
      - "5000:5000"
    environment:
      DATA_SERVICE_URL: http://data-service:5003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: losw
      DB_USER: root
      DB_PASS: root
    depends_on:
      - data-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/profile/health"]
      interval: 15s
      timeout: 5s
      retries: 6

  battle-service:
    build: ./battle-service
    container_name: battle-service
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/battle/health"]
      interval: 15s
      timeout: 5s
      retries: 6

  pve-service:
    build: ./pve-service
    container_name: pve-service
    ports:
      - "5002:5002"
    environment:
      DATA_SERVICE_URL: http://data-service:5003
      BATTLE_SERVICE_URL: http://battle-service:5001
    depends_on:
      - data-service
      - battle-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/api/pve/health"]
      interval: 15s
      timeout: 5s
      retries: 6

  pvp-service:
    build: ./pvp-service
    container_name: pvp-service
    ports:
      - "5004:5004"
    environment:
      DATA_SERVICE_URL: http://data-service:5003
      BATTLE_SERVICE_URL: http://battle-service:5001
    depends_on:
      - data-service
      - battle-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/api/pvp/health"]
      interval: 15s
      timeout: 5s
      retries: 6

  gateway:
    build: ./gateway
    container_name: legends-gateway
    ports:
      - "8080:8080"       # Single public-facing port for the whole system
    depends_on:
      - profile-service
      - battle-service
      - pve-service
      - data-service
      - pvp-service

volumes:
  mysql_data:
